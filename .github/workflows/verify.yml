name: Verify

on:
  push:
    branches:
      - main
      - feat/operational-completion
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Financial settlement tests
        run: npm run test:finance

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Tauri environment info
        run: npm run tauri -- info
